# configs/zap-api-rules.conf
# Formato: ID  AÇÃO  PARÂMETROS
# Ações: IGNORE | WARN | FAIL | INFO

# Silenciar alertas irrelevantes para APIs puras (sem HTML)
10020	IGNORE	(X-Frame-Options Header Not Set)
10021	IGNORE	(X-Content-Type-Options Header Missing)
10094	IGNORE	(Base64 Disclosure)  # FPs em tokens JWT

# Falhar em HIGH obrigatoriamente
40018	FAIL	(SQL Injection)
40012	FAIL	(Cross Site Scripting (Reflected))
90019	FAIL	(Server Side Code Injection)

# Somente avisar (não travar pipeline)
10016	WARN	(Web Browser XSS Protection Not Enabled)
10038	WARN	(Content Security Policy (CSP) Header Not Set)